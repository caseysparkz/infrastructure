target-version = "py314"
line-length = 120
indent-width = 4
exclude = [
    "**/node_modules/**/*.py",
    ".bzr",                                                                                        
    ".direnv",                                                                                     
    ".eggs",                                                                     
    ".git",                                                                      
    ".git-rewrite",                                                              
    ".hg",                                                                                         
    ".ipynb_checkpoints",                                                        
    ".mypy_cache",                                                               
    ".nox",                                                                                        
    ".pants.d",                                                                                    
    ".pyenv",                                                                                      
    ".pytest_cache",                                                                               
    ".pytype",                                                                   
    ".ruff_cache",                                                               
    ".svn",                                                                      
    ".tox",                                                                      
    ".venv",                                                                     
    ".vscode",                                                                   
    "__pypackages__",                                                            
    "_build",                                                                    
    "ansible/collections/caseysparkz/environment/roles/vim/files/vim/pack/plugins/start/**",
    "ansible_collections",                                                       
    "buck-out",                                                                  
    "build",                                                                     
    "dist",                                                                      
    "node_modules",                                                              
    "site-packages",                                                             
    "venv",  
]

[format]
docstring-code-format = true
docstring-code-line-length = "dynamic"
indent-style = "space"
line-ending = "auto"
quote-style = "double"
skip-magic-trailing-comma = false

[lint]
pydocstyle.convention = "google"
fixable = ["ALL"]
unfixable = []
select = ["ALL"]
ignore = [
    "TC002",    # flake8-type-checking::typing-only-third-party-import
    "TC003",    # flake8-type-checking::typing-only-standard-library-import
    "COM812",   # flake8-commas::missing-trailing-comma
    "FIX002",   # flake8-fixme::line-contains-todo
]

[lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "double"
multiline-quotes = "double"

[lint.mccabe]
max-complexity = 10  # `C901` when complexity > 10.

[lint.per-file-ignores]
"**/test_*.py"=[
    "ANN201",   # flake8-annotations::missing-return-type-undocumented-public-function
    "D1",       # pydocstyle::undocumented-*
    "INP001",   # flake8-no-pip420::implicit-namespace-package
    "PLR2004",  # pylint::magic-value-comparison
    "S101",     # flake8-bandit::assert
]
