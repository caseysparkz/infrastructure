# Author:       Casey Sparks
# Date:         November 15, 2023
# Description:  Validate Python code
---
name: "Python"
on:
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.py"                       # Any Python file.
      - "**/pyproject.toml"             # Any Python project file.
      - ".github/actions/*python*"      # Any action referencing Python.
      - ".github/workflows/python.yml"  # This workflow file.
env:
  PYTHON_VERSION: "3.13"
jobs:
  mypy:
    name: "mypy"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
        with:
          fetch-depth: 0

      - name: "Setup venv"
        uses: "./.github/actions/setup-python-venv"
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          package: ".[test]"

      - name: "mypy ."
        run: "mypy ."
  pytest:
    name: "pytest"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
        with:
          fetch-depth: 0

      - name: "Setup venv"
        uses: "./.github/actions/setup-python-venv"
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          package: ".[test]"

      - name: "pytest"
        run: "pytest"
  ruff:
    name: "ruff"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7.0.0
        with:
          fetch-depth: 0

      - name: "Setup venv"
        uses: "./.github/actions/setup-python-venv"
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          package: ".[test]"

      - name: "ruff check ."
        run: "ruff check ."

      - name: "ruff format --check ."
        run: "ruff format --check ."
